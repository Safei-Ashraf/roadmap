        const button = event.target.closest('[data-filter]');
        if (!button || !FILTERS.has(button.dataset.filter)) return;
        activeFilter = button.dataset.filter;
        applyFilter();
    });
    document.getElementById('expand-all').addEventListener('click', () => {
        uiState.collapsedPhases = [];
        saveUiState();
        document.querySelectorAll('.phaseGrid').forEach(grid => { grid.hidden = false; });
        document.querySelectorAll('.phaseDivider').forEach(button => button.setAttribute('aria-expanded', 'true'));
        document.querySelectorAll('details.timelineCard, details.weekGroup, details.readingGuide').forEach(section => { section.open = true; });
    });
    document.getElementById('collapse-all').addEventListener('click', () => {
        uiState.collapsedPhases = ROADMAP.timeline.rows.map(row => row.id);
        saveUiState();
        document.querySelectorAll('.phaseGrid').forEach(grid => { grid.hidden = true; });
        document.querySelectorAll('.phaseDivider').forEach(button => button.setAttribute('aria-expanded', 'false'));
        document.querySelectorAll('details.timelineCard, details.weekGroup, details.readingGuide').forEach(section => { section.open = false; });
    });
    document.getElementById('reset-progress').addEventListener('click', () => {
        if (!confirm('Reset all local progress?')) return;
        progress = {};
        uiState.phaseMilestones = {};
        saveUiState();
        saveProgress();
        render();
    });
    document.getElementById('focus-open').addEventListener('click', openFocusOverlay);
    document.getElementById('focus-close').addEventListener('click', closeFocusOverlay);
    document.getElementById('focus-overlay').addEventListener('click', event => { if (event.target.id === 'focus-overlay') closeFocusOverlay(); });
    document.getElementById('timer-open').addEventListener('click', () => {
        if (uiState.timerPanelOpen) closeTimerPanel();
        else openTimerPanel();
    });
    document.getElementById('timer-chip').addEventListener('click', openTimerPanel);
    document.getElementById('timer-close').addEventListener('click', closeTimerPanel);
    document.getElementById('timer-start').addEventListener('click', startTimer);
    document.getElementById('timer-pause').addEventListener('click', pauseTimer);
    document.getElementById('timer-resume').addEventListener('click', resumeTimer);
    document.getElementById('timer-reset').addEventListener('click', () => resetTimerToSelected(true));
    document.addEventListener('keydown', event => {
        if (event.key !== 'Escape') return;
        const focusOpen = document.getElementById('focus-overlay').classList.contains('open');
        if (focusOpen) {
            closeFocusOverlay();
            return;
        }
        if (uiState.timerPanelOpen) closeTimerPanel();
    });
}
render(); bindEvents(); initTimer();
</script>
</body>
</html>
